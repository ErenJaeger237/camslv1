services:
  - type: web
    name: camsl-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
